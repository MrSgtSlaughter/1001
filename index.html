<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0E2A47">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="1001 Companion">
<title>Course 1001 Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0E2A47; --navy-deep:#0A1F36;
  --sand:#D9D6C8; --sand-2:#E7E5DB; --paper:#FCFBF7;
  --gold:#E0A52E; --gold-deep:#B07F1A; --gold-soft:#F6EBD2;
  --ink:#1C2733; --mute:#5E6B78; --line:#C7C3B3; --line-soft:#DAD7CA;
  --ok:#2E7D4F; --alert:#C0492F;
  --radius:12px; --shadow:0 1px 2px rgba(14,42,71,.08),0 6px 18px rgba(14,42,71,.08); --fs:1;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:calc(16px * var(--fs))}
body{font-family:'Public Sans',system-ui,sans-serif;background:var(--sand);color:var(--ink);
  min-height:100vh;min-height:100dvh;padding-bottom:86px;line-height:1.5}
body.readable{letter-spacing:.012em;line-height:1.65}
body.readable p,body.readable li{font-size:1.04em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;touch-action:manipulation}
a{color:var(--navy)}

.topbar{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;
  padding:calc(env(safe-area-inset-top,0px) + 11px) 14px 11px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  box-shadow:0 2px 10px rgba(10,31,54,.3)}
.brand{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand .c{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.05rem;letter-spacing:.01em;white-space:nowrap}
.brand .c b{color:var(--gold)}
.brand .s{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#A9C0DA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ctrls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.lang{display:flex;border:1.4px solid #3C597B;border-radius:999px;overflow:hidden}
.lang button{padding:6px 11px;font-weight:700;font-size:.78rem;color:#cfe0f1;background:transparent;line-height:1}
.lang button.on{background:var(--gold);color:var(--navy-deep)}
.aa{display:flex;gap:4px}
.aa button{border:1.4px solid #3C597B;border-radius:7px;background:transparent;color:#cfe0f1;padding:6px 8px;font-weight:700;font-size:.72rem;line-height:1}
.aa button.on{background:var(--gold);color:var(--navy-deep);border-color:var(--gold)}

.view{display:none;max-width:680px;margin:0 auto;padding:16px 16px 26px}
.view.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.band{background:var(--navy);color:#fff;border-radius:10px;padding:14px 18px;margin-bottom:8px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px}
.band h2{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.4rem;letter-spacing:.01em}
.band .meta{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.lede{color:var(--mute);font-size:.94rem;margin:4px 2px 14px;line-height:1.5}

.dayseg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px;background:var(--sand-2)}
.dayseg button{flex:1;padding:11px;font-family:'Bricolage Grotesque';font-weight:700;font-size:.98rem;color:var(--mute);letter-spacing:.02em}
.dayseg button.on{background:var(--navy);color:#fff}

.flow{display:flex;flex-direction:column;gap:11px}
.step{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 15px;display:flex;align-items:center;gap:14px;text-align:left;width:100%;transition:border-color .14s,transform .08s}
.step:hover{border-color:var(--gold)}
.step:active{transform:scale(.99)}
.step .seq{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.05rem;color:var(--navy);background:var(--gold-soft);
  border:1.5px solid var(--gold);border-radius:9px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step .mid{flex:1;min-width:0}
.step .mid .t{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.04rem;color:var(--ink);line-height:1.2}
.step .mid .d{font-size:.83rem;color:var(--mute);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step .go{color:var(--gold-deep);font-size:1.1rem;flex-shrink:0}
.step .sl{font-family:'Bricolage Grotesque';font-weight:700;font-size:.66rem;letter-spacing:.02em;color:var(--gold-deep);
  background:var(--gold-soft);border:1px solid #E8D6A8;border-radius:6px;padding:3px 7px;white-space:nowrap;flex-shrink:0}

.backbtn{display:inline-flex;align-items:center;gap:6px;font-weight:600;color:var(--navy);font-size:.92rem;padding:8px 4px;margin-bottom:6px}
.dhead{position:relative;background:var(--navy);color:#fff;border-radius:12px;padding:18px 56px 16px 18px;margin-bottom:16px}
.dhead .k{font-family:'Bricolage Grotesque';font-weight:700;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.dhead h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.45rem;line-height:1.08;margin-top:3px}
.dhead .say{position:absolute;top:14px;right:14px;border:1.4px solid #3C597B;border-radius:9px;background:transparent;
  width:40px;height:40px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;color:#cfe0f1}
.dhead .say.on{background:var(--gold);color:var(--navy-deep);border-color:var(--gold)}
.dhead .sl{display:inline-block;margin-left:8px;font-size:.68rem;letter-spacing:.06em;color:#cfe0f1;
  border:1.4px solid #3C597B;border-radius:6px;padding:2px 7px;vertical-align:middle}

.chunk{background:var(--paper);border:1.5px solid var(--line-soft);border-left:4px solid var(--gold);border-radius:10px;
  box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
.chunk h4{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.04rem;color:var(--navy);margin-bottom:7px}
.chunk p{font-size:.94rem;color:var(--ink);margin-bottom:6px}
.chunk ul{list-style:none;margin:4px 0 2px}
.chunk li{font-size:.93rem;color:var(--ink);line-height:1.5;padding-left:20px;position:relative;margin-bottom:5px}
.chunk li::before{content:"";position:absolute;left:3px;top:.55em;width:7px;height:7px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}
.note{background:var(--gold-soft);border:1px solid #E8D6A8;border-radius:9px;padding:11px 13px;font-size:.88rem;color:#6B5212;line-height:1.5;margin-bottom:12px}
.note b{color:#5A4410}

.teach{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.teachrow{display:flex;align-items:stretch;border-top:1.5px solid var(--line-soft)}
.teachrow:first-child{border-top:none}
.teachrow .ltr{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.9rem;color:#fff;background:var(--navy);width:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.teachrow .body{padding:11px 14px}
.teachrow .body .w{font-family:'Bricolage Grotesque';font-weight:700;color:var(--gold-deep);font-size:1rem}
.teachrow .body .x{font-size:.9rem;color:var(--ink);margin-top:1px;line-height:1.45}

.dcard{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:13px;border-top:4px solid var(--navy)}
.dcard .tag{font-family:'Bricolage Grotesque';font-weight:700;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep)}
.dcard h3{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.22rem;color:var(--navy);margin:2px 0 8px}
.dcard ul{list-style:none}
.dcard li{font-size:.93rem;color:var(--ink);line-height:1.5;padding-left:20px;position:relative;margin-bottom:6px}
.dcard li::before{content:"";position:absolute;left:3px;top:.55em;width:7px;height:7px;border-radius:2px;background:var(--gold);transform:rotate(45deg)}
.gradedon{margin-top:10px;background:var(--sand-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
.gradedon .gl{font-family:'Bricolage Grotesque';font-weight:700;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);margin-bottom:4px}
.gradedon .gi{font-size:.86rem;color:var(--ink);display:inline-block;margin-right:4px}
.tmpl{margin-top:10px;border:1.5px solid var(--line);border-radius:9px;overflow:hidden}
.tmpl .row{display:grid;grid-template-columns:42% 58%;border-top:1px solid var(--line-soft);font-size:.85rem}
.tmpl .row:first-child{border-top:none}
.tmpl .row .l{background:var(--sand-2);padding:8px 10px;font-weight:600;color:var(--navy);text-align:right}
.tmpl .row .r{padding:8px 10px;color:var(--mute)}

.ladder{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.rung{display:flex;gap:12px;padding:13px 15px;border-top:1.5px solid var(--line-soft);align-items:baseline}
.rung:first-child{border-top:none}
.rung .no{font-family:'Bricolage Grotesque';font-weight:800;color:var(--gold-deep);font-size:1rem;flex-shrink:0;width:42px}
.rung .txt .t{font-family:'Bricolage Grotesque';font-weight:700;color:var(--navy)}
.rung .txt .d{font-size:.9rem;color:var(--mute);margin-top:1px}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:12px}
@media(max-width:480px){.duo{grid-template-columns:1fr}}
.minicard{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:11px;box-shadow:var(--shadow);padding:14px}
.minicard .h{font-family:'Bricolage Grotesque';font-weight:700;color:var(--navy);font-size:1rem;margin-bottom:5px}
.minicard p{font-size:.9rem;color:var(--ink);line-height:1.45}

.vsearch{width:100%;padding:12px 14px;font-size:1rem;font-family:inherit;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);margin-bottom:12px}
.vsearch:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold)}
.vrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:var(--paper);border:1.5px solid var(--line-soft);border-radius:9px;padding:10px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.vrow .cat{grid-column:1/-1;font-size:.66rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
.vrow .en{font-weight:700;color:var(--navy)}
.vrow .es{color:var(--ink)}

.fcard{background:var(--paper);border:1.5px solid var(--line-soft);border-radius:12px;box-shadow:var(--shadow);padding:18px 16px}
.fcard label{display:block;font-family:'Bricolage Grotesque';font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);margin:15px 0 6px}
.fcard label:first-child{margin-top:0}
.fcard input[type=text],.fcard textarea,.fcard select{width:100%;padding:12px;font-size:1rem;font-family:inherit;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
.fcard textarea{min-height:92px;resize:vertical}
.fcard input:focus,.fcard textarea:focus,.fcard select:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold)}
.moodrow{display:flex;gap:8px}
.mood{flex:1;padding:12px 6px;border:1.5px solid var(--line);border-radius:9px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.74rem;font-weight:600;color:var(--mute)}
.mood .e{font-size:1.4rem}
.mood.sel{border-color:var(--gold);background:var(--gold-soft);color:#6B5212}
.submit{width:100%;margin-top:18px;padding:15px;background:var(--navy);color:#fff;border-radius:10px;font-family:'Bricolage Grotesque';font-weight:800;font-size:1.1rem;letter-spacing:.02em}
.submit:disabled{opacity:.5}
.msg{margin-top:12px;padding:12px;border-radius:9px;font-size:.92rem;font-weight:600;display:none}
.msg.ok{display:block;background:#E5F2EA;color:var(--ok);border:1px solid #BBDCC8}
.msg.err{display:block;background:#FBE9E7;color:#B3402A;border:1px solid #F0C4BC}

.instrLink{display:block;margin:22px auto 0;color:var(--mute);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:10px;text-align:center}
.pinrow{display:flex;gap:8px;margin-top:8px}
.pinrow input{flex:1}
.pinrow button{padding:0 18px;background:var(--navy);color:#fff;border-radius:9px;font-weight:700}
.entry{background:var(--paper);border:1.5px solid var(--line-soft);border-left:4px solid var(--navy);border-radius:9px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.entry .meta{display:flex;justify-content:space-between;gap:8px;margin-bottom:3px}
.entry .who{font-family:'Bricolage Grotesque';font-weight:700;color:var(--navy)}
.entry .when{font-size:.76rem;color:var(--mute);white-space:nowrap}
.entry .moodline{font-size:.86rem;margin-bottom:3px}
.entry .q{font-size:.92rem;color:var(--ink);line-height:1.45}
.refresh{padding:10px 18px;background:var(--navy);color:#fff;border-radius:9px;font-weight:700;margin-bottom:14px}

.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--paper);border-top:1.5px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(14,42,71,.08)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 7px;color:var(--mute);font-size:.62rem;font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.tab .ic{font-size:1.22rem;line-height:1}
.tab.active{color:var(--gold-deep)}

.footer{text-align:center;color:var(--mute);font-size:.72rem;letter-spacing:.02em;margin-top:26px;line-height:1.7}
.footer b{color:var(--navy);font-weight:700}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="c">Course <b>1001</b></span>
    <span class="s" id="brandSub">Planning, Teaching &amp; Assessing Effective Lessons</span>
  </div>
  <div class="ctrls">
    <div class="lang">
      <button id="btnEN" onclick="setLang('en')">EN</button>
      <button id="btnES" onclick="setLang('es')">ES</button>
    </div>
    <div class="aa">
      <button onclick="bumpFont(-1)">A−</button>
      <button onclick="bumpFont(1)">A+</button>
      <button id="readBtn" onclick="toggleReadable()">Aa</button>
    </div>
  </div>
</header>

<!-- AGENDA -->
<main id="view-agenda" class="view active">
  <div class="band"><h2 id="agTitle"></h2><span class="meta" id="agMeta"></span></div>
  <p class="lede" id="agLede"></p>
  <div class="dayseg" id="dayseg">
    <button data-day="1" class="on" onclick="setDay(1)">Day 1</button>
    <button data-day="2" onclick="setDay(2)">Day 2</button>
    <button data-day="3" onclick="setDay(3)">Day 3</button>
    <button data-day="4" onclick="setDay(4)">Day 4</button>
    <button data-day="5" onclick="setDay(5)">Day 5</button>
  </div>
  <div class="flow" id="flow"></div>
  <button class="instrLink" id="instrLink" onclick="showView('instructor')"></button>
  <p class="footer" id="agFoot"></p>
</main>

<!-- DETAIL -->
<main id="view-detail" class="view">
  <button class="backbtn" id="detailBack" onclick="showView('agenda')"></button>
  <div id="detail"></div>
</main>

<!-- DELIVERABLES -->
<main id="view-deliverables" class="view">
  <div class="band"><h2 id="dvTitle"></h2><span class="meta" id="dvMeta"></span></div>
  <p class="lede" id="dvLede"></p>
  <div id="deliverables"></div>
  <p class="footer footerCopy"></p>
</main>

<!-- REFERENCE -->
<main id="view-reference" class="view">
  <div class="band"><h2 id="rfTitle"></h2><span class="meta" id="rfMeta"></span></div>
  <p class="lede" id="rfLede"></p>
  <div id="reference"></div>
  <p class="footer footerCopy"></p>
</main>

<!-- WORD WALL -->
<main id="view-words" class="view">
  <div class="band"><h2 id="wwTitle"></h2><span class="meta">EN ↔ ES</span></div>
  <p class="lede" id="wwLede"></p>
  <input class="vsearch" id="vsearch" oninput="renderVocab()">
  <div id="vocabList"></div>
  <p class="footer footerCopy"></p>
</main>

<!-- CHECK-IN -->
<main id="view-checkin" class="view">
  <div class="band"><h2 id="ciTitle"></h2><span class="meta">~1 min</span></div>
  <p class="lede" id="ciLede"></p>
  <div class="fcard">
    <label id="ciNameLab"></label>
    <input type="text" id="ciName" autocomplete="name">
    <label id="ciDayLab"></label>
    <select id="ciDay"><option value="1">Day 1 / Día 1</option><option value="2">Day 2 / Día 2</option><option value="3">Day 3 / Día 3</option><option value="4">Day 4 / Día 4</option><option value="5">Day 5 / Día 5</option></select>
    <label id="ciMoodLab"></label>
    <div class="moodrow" id="moodRow">
      <button class="mood" data-mood="got-it"><span class="e">✅</span><span class="ml" data-m="a"></span></button>
      <button class="mood" data-mood="mostly"><span class="e">🤔</span><span class="ml" data-m="b"></span></button>
      <button class="mood" data-mood="need-help"><span class="e">🆘</span><span class="ml" data-m="c"></span></button>
    </div>
    <label id="ciQLab"></label>
    <textarea id="ciQ"></textarea>
    <button class="submit" id="ciSubmit" onclick="submitCheckin()"></button>
    <div class="msg" id="ciMsg"></div>
  </div>
  <p class="footer footerCopy"></p>
</main>

<!-- INSTRUCTOR -->
<main id="view-instructor" class="view">
  <button class="backbtn" id="instrBack" onclick="showView('agenda')"></button>
  <div class="band"><h2 id="tTitle"></h2><span class="meta">Brenda Said-Wright</span></div>
  <div class="fcard" id="pinCard">
    <label id="tPinLab"></label>
    <div class="pinrow"><input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="••••"><button id="tUnlock" onclick="checkPin()"></button></div>
    <div class="msg" id="pinMsg"></div>
  </div>
  <div id="dashWrap" style="display:none">
    <button class="refresh" id="tRefresh" onclick="loadEntries()"></button>
    <div id="entryList"></div>
  </div>
  <p class="footer footerCopy"></p>
</main>

<nav class="tabbar">
  <button class="tab active" id="tab-agenda" onclick="showView('agenda')"><span class="ic">🗓️</span><span class="tl" data-t="agenda"></span></button>
  <button class="tab" id="tab-deliverables" onclick="showView('deliverables')"><span class="ic">📌</span><span class="tl" data-t="deliverables"></span></button>
  <button class="tab" id="tab-reference" onclick="showView('reference')"><span class="ic">📖</span><span class="tl" data-t="reference"></span></button>
  <button class="tab" id="tab-words" onclick="showView('words')"><span class="ic">🔤</span><span class="tl" data-t="words"></span></button>
  <button class="tab" id="tab-checkin" onclick="showView('checkin')"><span class="ic">✅</span><span class="tl" data-t="checkin"></span></button>
</nav>

<script>
/* =========================================================
   Course 1001 Companion — Day 1, 2, 3, 4 & 5 · EN/ES
   Instructor: Brenda Said-Wright
   © 2026 Jason Slaughter, PixelED Path, LLC
   Firebase REST only. Node: /course1001_2026
========================================================= */
const FB = "https://minigolf-fd9ea-default-rtdb.firebaseio.com/course1001_2026";
// Google Sheet check-in backend (Apps Script Web App). Replace with your /exec URL.
// See Checkins_AppsScript.gs for the script to deploy.
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxHBlDkFWaGg7wFWpaBmlufHRclUklX1uX6lDwGG7B2aEmjN5ogTmN3pUz6ylyYTi5q/exec";
const PIN = "1001";
let lang = "en";
let currentDay = 1;
let lastDetail = null;
let selectedMood = null;
let fontStep = 0;

function L(x){ return (x && typeof x==="object" && ("en" in x)) ? (x[lang]||x.en) : x; }

/* ---------------- UI strings ---------------- */
const STR = {
  brandSub:{en:"Planning, Teaching & Assessing Effective Lessons", es:"Planificar, Enseñar y Evaluar Lecciones Efectivas"},
  agMeta:{en:"Beginning", es:"Nivel Inicial"},

function renderFlow(){
  const wrap = document.getElementById("flow");
  wrap.innerHTML = "";
  DAYS[currentDay].forEach((s,i)=>{
    const b = document.createElement("button");
    b.className = "step";
    b.innerHTML = '<span class="seq">'+(i+1)+'</span><span class="mid"><span class="t">'+esc(L(s.title))+'</span><span class="d">'+esc(L(s.sub))+'</span></span>'+(s.slide?'<span class="sl">'+esc(L(STR.slideLbl))+' '+esc(s.slide)+'</span>':'')+'<span class="go">→</span>';
    b.onclick = ()=>renderDetail(i);
    wrap.appendChild(b);
  });
}

function renderDetail(i){
  lastDetail = i;
  const s = DAYS[currentDay][i];
  const stopLbl = L(STR.stopOf).replace("%1", i+1).replace("%2", DAYS[currentDay].length);
  let h = '<div class="dhead"><button class="say" id="sayBtn" onclick="speakDetail()">🔊</button><span class="k">'+esc(stopLbl)+'</span>'+(s.slide?'<span class="sl">'+esc(L(STR.slideLbl))+' '+esc(s.slide)+'</span>':'')+'<h3>'+esc(L(s.title))+'</h3></div>';
  if(s.teach){
    h += '<div class="teach">';
    TEACH.forEach(t=>{ h += '<div class="teachrow"><div class="ltr">'+t.l+'</div><div class="body"><div class="w">'+esc(L(t.w))+'</div><div class="x">'+esc(L(t.x))+'</div></div></div>'; });
    h += '</div>';
  }
  (s.chunks||[]).forEach(c=>{
    if(c.note){ h += '<div class="note">'+L(c.note)+'</div>'; return; }
    h += '<div class="chunk">';
    if(c.h) h += '<h4>'+esc(L(c.h))+'</h4>';
    if(c.p) h += '<p>'+esc(L(c.p))+'</p>';
    if(c.list){ h += '<ul>'; c.list.forEach(li=>h += '<li>'+esc(L(li))+'</li>'); h += '</ul>'; }
    h += '</div>';
  });
  document.getElementById("detail").innerHTML = h;
  detailSpeakText = buildSpeak(s);
  showView("detail");
}
function buildSpeak(s){
  let p=[L(s.title)];
  if(s.teach) TEACH.forEach(t=>p.push(L(t.w)+". "+L(t.x)));
  (s.chunks||[]).forEach(c=>{ if(c.note) return; if(c.h)p.push(L(c.h)); if(c.p)p.push(L(c.p)); if(c.list)c.list.forEach(li=>p.push(L(li))); });
  return p.join(". ");
}

/* ---------------- check-in ---------------- */
document.getElementById("moodRow").addEventListener("click", e=>{
  const btn = e.target.closest(".mood"); if(!btn) return;
  selectedMood = btn.dataset.mood;
  document.querySelectorAll(".mood").forEach(m=>m.classList.toggle("sel", m===btn));
});
async function submitCheckin(){
  const name = document.getElementById("ciName").value.trim();
  const day = document.getElementById("ciDay").value;
  const q = document.getElementById("ciQ").value.trim();
  const msg = document.getElementById("ciMsg"); msg.className = "msg";
  if(!name){ msg.className="msg err"; msg.textContent=L(STR.ciNeedName); return; }
  if(!selectedMood){ msg.className="msg err"; msg.textContent=L(STR.ciNeedMood); return; }
  const btn = document.getElementById("ciSubmit"); btn.disabled = true;
  try{
    // text/plain avoids a CORS preflight that Apps Script Web Apps can't handle;
    // the script itself still parses the body as JSON.
    const res = await fetch(SHEET_URL, {method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({name,day,mood:selectedMood,question:q,lang,ts:Date.now()})});
    const data = await res.json();
    if(!res.ok || data.ok===false) throw new Error(data.error||("HTTP "+res.status));
    msg.className="msg ok"; msg.textContent=L(STR.ciOk);
    document.getElementById("ciQ").value=""; selectedMood=null;
    document.querySelectorAll(".mood").forEach(m=>m.classList.remove("sel"));
  }catch(e){ msg.className="msg err"; msg.textContent=L(STR.ciErr)+" ("+e.message+")"; console.error("Check-in submit failed:", e); }
  btn.disabled = false;
}

/* ---------------- instructor ---------------- */
function checkPin(){
  const v = document.getElementById("pinInput").value;
  const msg = document.getElementById("pinMsg");
  if(v===PIN){ document.getElementById("pinCard").style.display="none"; document.getElementById("dashWrap").style.display="block"; loadEntries(); }
  else { msg.className="msg err"; msg.textContent=L(STR.tWrong); }
}
async function loadEntries(){
  const wrap = document.getElementById("entryList");
  wrap.innerHTML = "<p class='lede'>"+L(STR.tLoading)+"</p>";
  try{
    const res = await fetch(SHEET_URL); const data = await res.json();
    wrap.innerHTML = "";
    if(!data || !data.length){ wrap.innerHTML = "<p class='lede'>"+L(STR.tEmpty)+"</p>"; return; }
    data.slice().sort((a,b)=>(b.ts||0)-(a.ts||0)).forEach(en=>{
      const dt = new Date(en.ts);
      const when = dt.toLocaleDateString()+" "+dt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      const mood = L(STR.moodLabels[en.mood]) || en.mood;
      wrap.insertAdjacentHTML("beforeend",
        '<div class="entry"><div class="meta"><span class="who">'+esc(en.name)+' · '+(lang==="en"?"Day ":"Día ")+esc(en.day||"")+'</span><span class="when">'+when+'</span></div>'+
        '<div class="moodline">'+mood+'</div>'+(en.question?'<div class="q">💬 '+esc(en.question)+'</div>':'')+'</div>');
    });
  }catch(e){ wrap.innerHTML = "<p class='lede'>"+L(STR.ciErr)+" ("+e.message+")</p>"; console.error("Dashboard load failed:", e); }
}

/* ---------------- read aloud ---------------- */
let detailSpeakText = "";
function speakDetail(){
  const btn = document.getElementById("sayBtn");
  if(!window.speechSynthesis) return;
  if(speechSynthesis.speaking){ speechSynthesis.cancel(); if(btn)btn.classList.remove("on"); return; }
  const u = new SpeechSynthesisUtterance(detailSpeakText);
  u.lang = (lang==="es")?"es-MX":"en-US"; u.rate = 1.0;
  const voices = (speechSynthesis.getVoices()||[]);
  const v = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith(lang==="es"?"es":"en"));
  if(v) u.voice = v;
  u.onend = ()=>{ if(btn)btn.classList.remove("on"); };
  speechSynthesis.speak(u); if(btn)btn.classList.add("on");
}
if(window.speechSynthesis) speechSynthesis.onvoiceschanged=()=>{};

/* ---------------- a11y + nav ---------------- */
function bumpFont(d){ fontStep = Math.max(-1,Math.min(3,fontStep+d)); document.documentElement.style.setProperty("--fs",(1+fontStep*0.12).toFixed(2)); }
function toggleReadable(){ document.body.classList.toggle("readable"); document.getElementById("readBtn").classList.toggle("on"); }
function showView(v){
  if(window.speechSynthesis) speechSynthesis.cancel();
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("active"));
  document.getElementById("view-"+v).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  const tab = document.getElementById("tab-"+v); if(tab) tab.classList.add("active");
  window.scrollTo(0,0);
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
